<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>サイト公開チェックリスト</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Hiragino Kaku Gothic ProN", Meiryo, sans-serif;
      background: #f0f2f5; color: #333; min-height: 100vh;
    }
    .app { display: flex; min-height: 100vh; }

    /* SIDEBAR */
    .sidebar {
      width: 280px; background: #1a1a2e; color: white;
      display: flex; flex-direction: column; flex-shrink: 0;
      position: fixed; top: 0; left: 0; bottom: 0; overflow: hidden; z-index: 100;
    }
    .sidebar-header { padding: 20px 20px 16px; border-bottom: 1px solid rgba(255,255,255,0.08); }
    .sidebar-header h1 { font-size: 16px; font-weight: 700; }
    .sidebar-header p { font-size: 12px; color: #888; margin-top: 3px; }
    .live-badge {
      display: inline-flex; align-items: center; gap: 5px;
      font-size: 11px; color: #4ade80; margin-top: 6px;
    }
    .live-dot {
      width: 6px; height: 6px; border-radius: 50%; background: #4ade80;
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; } 50% { opacity: 0.3; }
    }
    .sidebar-new { margin: 12px 16px; }
    .btn-new {
      width: 100%; padding: 10px; background: #4f46e5; color: white;
      border: none; border-radius: 8px; font-size: 14px; font-weight: 600;
      cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 6px;
    }
    .btn-new:hover { background: #4338ca; }
    .project-list { flex: 1; overflow-y: auto; padding: 4px 8px 16px; }
    .project-list-label {
      font-size: 10px; font-weight: 700; color: #666;
      letter-spacing: 0.1em; text-transform: uppercase; padding: 12px 8px 6px;
    }
    .project-item {
      padding: 10px 12px; border-radius: 8px; cursor: pointer;
      margin-bottom: 2px; transition: background 0.15s;
    }
    .project-item:hover { background: rgba(255,255,255,0.07); }
    .project-item.active { background: rgba(255,255,255,0.12); }
    .project-item-name { font-size: 14px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .project-item-meta { font-size: 11px; color: #888; margin-top: 3px; display: flex; align-items: center; gap: 8px; }
    .project-item-bar { flex: 1; background: rgba(255,255,255,0.1); border-radius: 4px; height: 4px; overflow: hidden; }
    .project-item-bar-fill { height: 100%; background: #4caf50; border-radius: 4px; transition: width 0.3s; }
    .project-item-pct { font-size: 11px; color: #888; width: 30px; text-align: right; }

    /* MAIN */
    .main { margin-left: 280px; flex: 1; display: flex; flex-direction: column; min-height: 100vh; }

    /* TOPBAR */
    .topbar {
      background: white; border-bottom: 1px solid #e5e7eb;
      padding: 14px 32px; display: flex; align-items: center; gap: 16px;
      position: sticky; top: 0; z-index: 50;
    }
    .topbar-title { font-size: 18px; font-weight: 700; flex: 1; }
    .topbar-title input {
      font-size: 18px; font-weight: 700; border: none; outline: none;
      width: 100%; background: transparent;
    }
    .topbar-title input:focus { text-decoration: underline; }
    .progress-wrap { display: flex; align-items: center; gap: 10px; }
    .progress-bar-bg { width: 120px; height: 8px; background: #e5e7eb; border-radius: 4px; overflow: hidden; }
    .progress-bar-fg { height: 100%; background: #4caf50; border-radius: 4px; transition: width 0.3s; }
    .progress-text { font-size: 13px; color: #888; white-space: nowrap; }

    /* META BAR */
    .meta-bar {
      background: white; border-bottom: 1px solid #e5e7eb;
      padding: 12px 32px; display: flex; flex-wrap: wrap; gap: 16px; align-items: flex-end;
    }
    .meta-field { display: flex; flex-direction: column; gap: 3px; }
    .meta-field label { font-size: 11px; font-weight: 600; color: #999; }
    .meta-field input {
      border: 1.5px solid #e5e7eb; border-radius: 6px;
      padding: 5px 10px; font-size: 13px; min-width: 160px;
    }
    .meta-field input:focus { outline: none; border-color: #4f46e5; }
    .meta-actions { display: flex; gap: 8px; align-items: flex-end; margin-left: auto; }

    .btn { padding: 7px 16px; border-radius: 7px; border: none; cursor: pointer; font-size: 13px; font-weight: 600; white-space: nowrap; }
    .btn-primary { background: #1a1a2e; color: white; }
    .btn-primary:hover { background: #2d2d4e; }
    .btn-outline { background: white; border: 1.5px solid #ddd; color: #555; }
    .btn-outline:hover { border-color: #999; }
    .btn-danger { background: white; border: 1.5px solid #fcc; color: #c00; }
    .btn-danger:hover { background: #fee; }

    /* AUTO CHECK */
    .auto-check-bar { background: white; border-bottom: 1px solid #e5e7eb; padding: 12px 32px; }
    .auto-check-header { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
    .auto-check-title { font-size: 13px; font-weight: 700; color: #444; }
    .auto-check-hint { font-size: 12px; color: #bbb; }
    .btn-check { padding: 7px 18px; border-radius: 7px; border: none; cursor: pointer; font-size: 13px; font-weight: 600; background: #0ea5e9; color: white; white-space: nowrap; }
    .btn-check:hover:not(:disabled) { background: #0284c7; }
    .btn-check:disabled { opacity: 0.4; cursor: default; }
    .check-results-grid {
      margin-top: 12px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 8px;
    }
    .cri {
      padding: 9px 13px; border-radius: 8px; border: 1.5px solid;
      display: flex; align-items: flex-start; gap: 8px; font-size: 13px;
    }
    .cri.pass { border-color: #bbf7d0; background: #f0fdf4; }
    .cri.fail { border-color: #fecaca; background: #fef2f2; }
    .cri.warn { border-color: #fde68a; background: #fffbeb; }
    .cri.info { border-color: #e0e7ff; background: #eef2ff; }
    .cri-icon { font-size: 15px; flex-shrink: 0; margin-top: 1px; }
    .cri-label { font-weight: 600; color: #333; line-height: 1.4; }
    .cri-detail { font-size: 11px; color: #666; margin-top: 2px; line-height: 1.5; word-break: break-all; }

    /* DNS MONITORING */
    .dns-status { margin-top: 6px; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .dns-badge { font-size: 11px; font-weight: 600; padding: 3px 10px; border-radius: 20px; }
    .dns-badge.monitoring { background: #eff6ff; color: #2563eb; border: 1px solid #bfdbfe; }
    .dns-badge.confirmed { background: #f0fdf4; color: #16a34a; border: 1px solid #bbf7d0; }
    .btn-dns { font-size: 11px; font-weight: 600; padding: 4px 12px; border-radius: 6px; border: none; cursor: pointer; }
    .btn-dns-start { background: #f0f9ff; color: #0369a1; border: 1px solid #bae6fd; }
    .btn-dns-start:hover { background: #e0f2fe; }
    .btn-dns-now { background: #eff6ff; color: #2563eb; border: 1px solid #bfdbfe; }
    .btn-dns-now:hover:not(:disabled) { background: #dbeafe; }
    .btn-dns-now:disabled { opacity: 0.4; cursor: default; }

    /* PROJECT SETTINGS */
    .settings-bar { background: #fafafa; border-bottom: 1px solid #e5e7eb; padding: 12px 32px; }
    .settings-bar-header { display: flex; align-items: center; gap: 8px; cursor: pointer; user-select: none; margin-bottom: 0; }
    .settings-bar-header.open { margin-bottom: 12px; }
    .settings-bar-title { font-size: 12px; font-weight: 700; color: #888; }
    .settings-bar-hint { font-size: 11px; color: #bbb; flex: 1; }
    .settings-groups { display: flex; gap: 24px; flex-wrap: wrap; }
    .settings-group-label { font-size: 11px; font-weight: 700; color: #999; margin-bottom: 6px; }
    .settings-select { font-size: 13px; padding: 6px 10px; border: 1.5px solid #e5e7eb; border-radius: 8px; background: white; color: #333; cursor: pointer; min-width: 180px; }
    .settings-select:focus { outline: none; border-color: #4f46e5; }
    .settings-select option { color: #333; }

    /* MEMO BAR */
    .memo-bar { background: white; border-bottom: 1px solid #e5e7eb; padding: 10px 32px; }
    .memo-bar label { font-size: 11px; font-weight: 600; color: #999; display: block; margin-bottom: 4px; }
    .memo-bar textarea {
      width: 100%; border: 1.5px solid #e5e7eb; border-radius: 6px;
      padding: 7px 10px; font-size: 13px; resize: vertical; min-height: 54px;
      font-family: inherit; line-height: 1.6; color: #333;
    }
    .memo-bar textarea:focus { outline: none; border-color: #4f46e5; }

    /* CHECKLIST */
    .checklist-area { padding: 24px 32px; flex: 1; }
    .phase { background: white; border-radius: 12px; margin-bottom: 16px; box-shadow: 0 1px 4px rgba(0,0,0,0.06); overflow: hidden; }
    .phase-header {
      padding: 14px 20px; display: flex; align-items: center; gap: 10px;
      cursor: pointer; user-select: none; border-bottom: 1px solid #f3f4f6;
    }
    .phase-header:hover { background: #fafafa; }
    .phase-icon { font-size: 18px; }
    .phase-title { font-size: 15px; font-weight: 700; flex: 1; }
    .phase-count { font-size: 12px; background: #f3f4f6; border-radius: 20px; padding: 2px 10px; color: #666; }
    .phase-count.done { background: #dcfce7; color: #16a34a; }
    .phase-toggle { color: #bbb; transition: transform 0.2s; font-size: 14px; }
    .phase.collapsed .phase-toggle { transform: rotate(-90deg); }
    .phase.collapsed .phase-body { display: none; }
    .phase-body { padding: 6px 0; }
    .section-label {
      font-size: 11px; font-weight: 700; color: #bbb;
      letter-spacing: 0.08em; text-transform: uppercase; padding: 12px 20px 4px;
    }
    .check-item {
      display: flex; align-items: flex-start; gap: 10px;
      padding: 9px 20px; cursor: pointer; transition: background 0.1s;
    }
    .check-item:hover { background: #f9fafb; }
    .check-item input[type="checkbox"] { width: 16px; height: 16px; margin-top: 3px; flex-shrink: 0; accent-color: #4f46e5; cursor: pointer; }
    .check-item .text { flex: 1; }
    .check-item .label { font-size: 14px; line-height: 1.5; }
    .check-item .note { font-size: 12px; color: #9ca3af; margin-top: 1px; line-height: 1.5; }
    .check-item.done .label { color: #d1d5db; text-decoration: line-through; }
    .check-item.done .note { color: #e5e7eb; }
    .tag { display: inline-block; font-size: 10px; font-weight: 700; padding: 1px 6px; border-radius: 4px; margin-left: 5px; vertical-align: middle; }
    .tag-critical { background: #fef2f2; color: #dc2626; }

    /* EMPTY / LOADING */
    .empty-state {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 80px 32px; color: #aaa; text-align: center;
    }
    .empty-state .icon { font-size: 64px; margin-bottom: 16px; }
    .empty-state h2 { font-size: 20px; font-weight: 700; color: #555; margin-bottom: 8px; }
    .empty-state p { font-size: 14px; line-height: 1.7; }
    .empty-state .btn-new-lg {
      margin-top: 24px; padding: 12px 28px; background: #4f46e5; color: white;
      border: none; border-radius: 10px; font-size: 15px; font-weight: 600; cursor: pointer;
    }
    .empty-state .btn-new-lg:hover { background: #4338ca; }

    .loading-overlay {
      position: fixed; inset: 0; background: rgba(255,255,255,0.7);
      display: flex; align-items: center; justify-content: center; z-index: 500;
    }
    .loading-overlay.hidden { display: none; }
    .spinner {
      width: 36px; height: 36px; border: 3px solid #e5e7eb;
      border-top-color: #4f46e5; border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* MODAL */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.4);
      display: flex; align-items: center; justify-content: center; z-index: 200;
    }
    .modal-overlay.hidden { display: none; }
    .modal {
      background: white; border-radius: 14px; padding: 28px;
      width: 440px; max-width: calc(100vw - 32px);
      box-shadow: 0 20px 60px rgba(0,0,0,0.2);
    }
    .modal h2 { font-size: 17px; font-weight: 700; margin-bottom: 20px; }
    .modal label { display: block; font-size: 12px; font-weight: 600; color: #888; margin-bottom: 5px; }
    .modal input {
      width: 100%; border: 1.5px solid #e5e7eb; border-radius: 8px;
      padding: 9px 12px; font-size: 14px; margin-bottom: 14px;
    }
    .modal input:focus { outline: none; border-color: #4f46e5; }
    .modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 4px; }

    /* TOAST */
    .toast {
      position: fixed; bottom: 24px; right: 24px;
      background: #1a1a2e; color: white;
      padding: 11px 18px; border-radius: 8px;
      font-size: 13px; opacity: 0; transition: opacity 0.3s; pointer-events: none; z-index: 999;
    }
    .toast.show { opacity: 1; }

    @media (max-width: 700px) {
      .sidebar { width: 220px; }
      .main { margin-left: 220px; }
      .topbar, .meta-bar, .checklist-area { padding-left: 16px; padding-right: 16px; }
    }
  </style>
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <div class="sidebar-header">
      <h1>公開チェックリスト</h1>
      <p>WordPress 公開フロー管理</p>
      <div class="live-badge"><span class="live-dot"></span>リアルタイム同期中</div>
    </div>
    <div class="sidebar-new">
      <button class="btn-new" onclick="openNewModal()">＋ 新規案件</button>
    </div>
    <div class="project-list" id="projectList"></div>
  </aside>

  <main class="main" id="mainArea">
    <div class="empty-state" id="emptyState">
      <div class="icon">📋</div>
      <h2>案件を選択または作成してください</h2>
      <p>左のメニューから案件を選ぶか、<br>新規案件を作成してチェックリストを開始します。</p>
      <button class="btn-new-lg" onclick="openNewModal()">＋ 最初の案件を作成</button>
    </div>

    <div id="projectView" style="display:none; flex-direction:column; min-height:100vh;">
      <div class="topbar">
        <div class="topbar-title">
          <input type="text" id="editName" placeholder="案件名" oninput="onNameInput()" />
        </div>
        <div class="progress-wrap">
          <div class="progress-bar-bg">
            <div class="progress-bar-fg" id="progressFill" style="width:0%"></div>
          </div>
          <span class="progress-text" id="progressText">0 / 0</span>
        </div>
      </div>
      <div class="meta-bar">
        <div class="meta-field">
          <label>本番URL</label>
          <input type="text" id="editUrl" placeholder="https://example.co.jp" oninput="onMetaInput()" />
        </div>
        <div class="meta-field">
          <label>公開予定日</label>
          <input type="date" id="editDate" oninput="onMetaInput()" />
        </div>
        <div class="meta-field">
          <label>担当者</label>
          <input type="text" id="editOwner" placeholder="例：山田" oninput="onMetaInput()" />
        </div>
        <div class="meta-actions">
          <button class="btn btn-outline" onclick="exportTxt()">書き出し</button>
          <button class="btn btn-outline" onclick="uncheckAll()">リセット</button>
          <button class="btn btn-danger" onclick="deleteProject()">削除</button>
        </div>
      </div>
      <div class="auto-check-bar">
        <div class="auto-check-header">
          <span class="auto-check-title">🔍 自動チェック</span>
          <button class="btn-check" id="runCheckBtn" onclick="runAutoCheck()" disabled>チェック実行</button>
          <span class="auto-check-hint" id="checkHint">本番URLを入力すると実行できます</span>
        </div>
        <div id="checkResultsGrid" class="check-results-grid" style="display:none"></div>
      </div>
      <div class="memo-bar">
        <label>備考・メモ</label>
        <textarea id="editMemo" placeholder="案件に関するメモ、注意事項、引き継ぎ事項など..." oninput="onMemoInput()"></textarea>
      </div>
      <div class="settings-bar">
        <div class="settings-bar-header" id="settingsHeader" onclick="toggleSettings()">
          <span style="font-size:13px">⚙️</span>
          <span class="settings-bar-title">プロジェクト種別</span>
          <span class="settings-bar-hint" id="settingsHint">選択するとチェックリストが絞り込まれます ▸</span>
        </div>
        <div id="settingsBody" style="display:none">
          <div class="settings-groups">
            <div>
              <div class="settings-group-label">ドメイン</div>
              <select id="sel_domain_type" class="settings-select" onchange="onSettingsChange()">
                <option value="">— 選択してください —</option>
                <option value="new">🆕 新規取得</option>
                <option value="transfer">🔄 移管</option>
                <option value="existing">♻️ 既存流用</option>
              </select>
            </div>
            <div>
              <div class="settings-group-label">Webサーバー</div>
              <select id="sel_server_type" class="settings-select" onchange="onSettingsChange()">
                <option value="">— 選択してください —</option>
                <option value="own">🏢 自社サーバーに移設</option>
                <option value="existing">♻️ 既存のまま</option>
              </select>
            </div>
            <div>
              <div class="settings-group-label">メールサーバー</div>
              <select id="sel_mail_type" class="settings-select" onchange="onSettingsChange()">
                <option value="">— 選択してください —</option>
                <option value="new">🆕 新規設定</option>
                <option value="existing">♻️ 既存継続</option>
                <option value="none">➖ なし</option>
              </select>
            </div>
          </div>
        </div>
      </div>
      <div class="checklist-area" id="checklistArea"></div>
    </div>
  </main>
</div>

<div class="modal-overlay hidden" id="newModal">
  <div class="modal">
    <h2>新規案件を作成</h2>
    <label>案件名 <span style="color:#dc2626">*</span></label>
    <input type="text" id="newName" placeholder="例：株式会社〇〇 コーポレートサイト" />
    <label>本番URL</label>
    <input type="text" id="newUrl" placeholder="https://example.co.jp" />
    <label>公開予定日</label>
    <input type="date" id="newDate" />
    <label>担当者</label>
    <input type="text" id="newOwner" placeholder="例：山田" />
    <div class="modal-actions">
      <button class="btn btn-outline" onclick="closeNewModal()">キャンセル</button>
      <button class="btn btn-primary" onclick="createProject()">作成</button>
    </div>
  </div>
</div>

<div class="loading-overlay hidden" id="loadingOverlay">
  <div class="spinner"></div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
import { createClient } from 'https://esm.sh/@supabase/supabase-js@2'

const SUPABASE_URL = 'https://ykfiydyfmtypndzrgiow.supabase.co'
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlrZml5ZHlmbXR5cG5kenJnaW93Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg1NTQ4NjYsImV4cCI6MjA5NDEzMDg2Nn0.DA8uZn9jE7t3C_ntE58vhOw8_SieKbHXc2Zjwx7RzGw'

const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY)

// ===== チェックリスト定義 =====
const PHASES = [
  {
    id: 'pre_months', icon: '🗓️', title: '公開1〜2ヶ月前',
    sections: [
      { label: 'ドメイン（公開6週前目安）', items: [
        // 新規取得
        { id: 'domain_search',           label: 'ドメイン名の候補選定・空き確認',        note: '希望ドメインが取得可能か確認', conditions: ['domain:new'] },
        { id: 'domain_contract',         label: 'ドメインの取得・契約',                  note: '遅くとも公開6週前までに完了', critical: true, conditions: ['domain:new'] },
        // 移管
        { id: 'domain_transfer_unlock',  label: '移管元のドメインロック解除',            note: '移管元レジストラの管理画面で操作', conditions: ['domain:transfer'] },
        { id: 'domain_auth_code',        label: '認証コード（AuthCode）の取得',           note: '移管申請に必要。発行まで時間がかかる場合あり', critical: true, conditions: ['domain:transfer'] },

        { id: 'domain_whois',            label: 'ドメイン認証・所有者情報の確認',         note: 'Whois情報・認証メールの受信確認' },
      ]},

// ===== STATE =====
let projects = {}
let currentId = null

// ===== DB =====
async function loadAllProjects() {
  const { data } = await supabase.from('projects').select('*').order('created_at', { ascending: false })
  projects = {}
  for (const p of (data || [])) {
    projects[p.id] = dbRowToProject(p)
  }
}

async function loadChecksForProject(projectId) {
  const { data } = await supabase.from('checks').select('item_id, checked').eq('project_id', projectId)
  if (projects[projectId]) {
    projects[projectId].checks = {}
    for (const row of (data || [])) {
      if (row.checked) projects[projectId].checks[row.item_id] = true
    }
  }
}

async function insertProject(name, url, date, owner) {
  const { data, error } = await supabase.from('projects').insert({
    name, url: url || null, launch_date: date || null, owner: owner || null
  }).select().single()
  if (error) throw error
  projects[data.id] = dbRowToProject(data)
  return data.id
}

async function saveProjectMeta(id) {
  const p = projects[id]
  await supabase.from('projects').update({
    name: p.name, url: p.url || null,
    launch_date: p.date || null, owner: p.owner || null,
    memo: p.memo || null,
    domain_type: p.domain_type || null,
    server_type: p.server_type || null,
    mail_type: p.mail_type || null,
  }).eq('id', id)
}

async function upsertCheck(projectId, itemId, checked) {
  await supabase.from('checks').upsert(
    { project_id: projectId, item_id: itemId, checked },
    { onConflict: 'project_id,item_id' }
  )
}

async function removeProject(id) {
  await supabase.from('projects').delete().eq('id', id)
}

function dbRowToProject(p) {
  return {
    id: p.id, name: p.name, url: p.url || '',
    date: p.launch_date || '', owner: p.owner || '',
    memo: p.memo || '',
    domain_type: p.domain_type || null,
    server_type: p.server_type || null,
    mail_type: p.mail_type || null,
    dns_monitoring: p.dns_monitoring || false,
    dns_confirmed_at: p.dns_confirmed_at || null,
    createdAt: new Date(p.created_at).getTime(), checks: {}
  }
}

function itemApplies(item, proj) {
  if (!item.conditions || item.conditions.length === 0) return true
  const typeMap = { domain: 'domain_type', server: 'server_type', mail: 'mail_type' }
  return item.conditions.some(c => {
    const [field, value] = c.split(':')
    const key = typeMap[field]
    if (!key) return true
    const projVal = proj[key]
    if (!projVal) return true  // 未設定なら全て表示
    return projVal === value
  })
}

// ===== REALTIME =====
function subscribeRealtime() {
  supabase.channel('db-changes')
    .on('postgres_changes', { event: '*', schema: 'public', table: 'checks' }, payload => {
      const row = payload.new || {}
      const pid = row.project_id
      if (!pid || !projects[pid]) return
      if (row.checked) {
        projects[pid].checks[row.item_id] = true
      } else {
        delete projects[pid].checks[row.item_id]
      }
      renderSidebar()
      if (pid === currentId) { renderChecklist(); updateProgress() }
    })
    .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'projects' }, payload => {
      const p = payload.new
      if (!projects[p.id]) { projects[p.id] = dbRowToProject(p); renderSidebar() }
    })
    .on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'projects' }, payload => {
      const p = payload.new
      if (!projects[p.id]) return
      Object.assign(projects[p.id], { name: p.name, url: p.url || '', date: p.launch_date || '', owner: p.owner || '', memo: p.memo || '', domain_type: p.domain_type || null, server_type: p.server_type || null, mail_type: p.mail_type || null, dns_monitoring: p.dns_monitoring || false, dns_confirmed_at: p.dns_confirmed_at || null })
      renderSidebar()
      if (p.id === currentId) {
        document.getElementById('editName').value = p.name
        document.getElementById('editUrl').value = p.url || ''
        document.getElementById('editDate').value = p.launch_date || ''
        document.getElementById('editOwner').value = p.owner || ''
        if (document.activeElement !== document.getElementById('editMemo')) {
          document.getElementById('editMemo').value = p.memo || ''
        }
      }
    })
    .on('postgres_changes', { event: 'DELETE', schema: 'public', table: 'projects' }, payload => {
      const id = payload.old.id
      delete projects[id]
      renderSidebar()
      if (id === currentId) {
        currentId = null
        document.getElementById('projectView').style.display = 'none'
        document.getElementById('emptyState').style.display = 'flex'
      }
    })
    .subscribe()
}

// ===== RENDER SIDEBAR =====
function calcProgress(proj) {
  let total = 0, done = 0
  PHASES.forEach(p => p.sections.forEach(s => s.items.forEach(i => {
    total++
    if (proj.checks && proj.checks[i.id]) done++
  })))
  return { total, done, pct: total ? Math.round(done / total * 100) : 0 }
}

function renderSidebar() {
  const list = document.getElementById('projectList')
  const ids = Object.keys(projects).sort((a, b) => (projects[b].createdAt || 0) - (projects[a].createdAt || 0))
  if (ids.length === 0) {
    list.innerHTML = '<div class="project-list-label">案件なし</div>'
    return
  }
  let html = '<div class="project-list-label">案件一覧</div>'
  ids.forEach(id => {
    const p = projects[id]
    const { pct } = calcProgress(p)
    const active = id === currentId ? 'active' : ''
    html += `
      <div class="project-item ${active}" onclick="window._selectProject('${id}')">
        <div class="project-item-name">${esc(p.name)}</div>
        <div class="project-item-meta">
          <div class="project-item-bar"><div class="project-item-bar-fill" style="width:${pct}%"></div></div>
          <span class="project-item-pct">${pct}%</span>
        </div>
      </div>`
  })
  list.innerHTML = html
}

// ===== SELECT PROJECT =====
window._selectProject = async function(id) {
  showLoading(true)
  currentId = id
  localStorage.setItem('cl_current', id)
  if (!projects[id].checks || Object.keys(projects[id].checks).length === 0) {
    await loadChecksForProject(id)
  }
  renderSidebar()
  renderProjectView()
  showLoading(false)
}

function renderProjectView() {
  const proj = projects[currentId]
  document.getElementById('emptyState').style.display = 'none'
  const view = document.getElementById('projectView')
  view.style.display = 'flex'
  document.getElementById('editName').value = proj.name || ''
  document.getElementById('editUrl').value = proj.url || ''
  document.getElementById('editDate').value = proj.date || ''
  document.getElementById('editOwner').value = proj.owner || ''
  document.getElementById('editMemo').value = proj.memo || ''
  document.getElementById('checkResultsGrid').style.display = 'none'
  syncCheckButton()
  syncSettings()
  renderChecklist()
  updateProgress()
}

function renderChecklist() {
  const proj = projects[currentId]
  const area = document.getElementById('checklistArea')
  let html = ''
  PHASES.forEach(phase => {
    let phaseTotal = 0, phaseDone = 0
    let sectionsHtml = ''
    phase.sections.forEach(section => {
      sectionsHtml += `<div class="section-label">${section.label}</div>`
      section.items.forEach(item => {
        if (!itemApplies(item, proj)) return
        const checked = proj.checks && proj.checks[item.id]
        phaseTotal++
        if (checked) phaseDone++
        if (!itemApplies(item, proj)) return
        const critTag = item.critical ? `<span class="tag tag-critical">重要</span>` : ''
        let extraHtml = ''
        if (item.id === 'ns_switch' && checked) {
          const p = projects[currentId]
          if (p.dns_confirmed_at) {
            const dt = new Date(p.dns_confirmed_at).toLocaleString('ja-JP', { month: 'numeric', day: 'numeric', hour: '2-digit', minute: '2-digit' })
            extraHtml = `<div class="dns-status"><span class="dns-badge confirmed">✅ DNS伝播確認済み（${dt}）</span></div>`
          } else if (p.dns_monitoring) {
            extraHtml = `<div class="dns-status"><span class="dns-badge monitoring">🔵 監視中</span><button class="btn-dns btn-dns-now" id="dnsNowBtn" onclick="event.stopPropagation();checkDnsNow()">今すぐ確認</button></div>`
          } else {
            extraHtml = `<div class="dns-status"><button class="btn-dns btn-dns-start" onclick="event.stopPropagation();startDnsMonitoring()">DNS監視を開始</button></div>`
          }
        }
        sectionsHtml += `
          <div class="check-item ${checked ? 'done' : ''}" onclick="window._toggleItem('${item.id}')">
            <input type="checkbox" ${checked ? 'checked' : ''} onclick="event.stopPropagation(); window._toggleItem('${item.id}')" />
            <div class="text">
              <div class="label">${item.label}${critTag}</div>
              ${item.note ? `<div class="note">${item.note}</div>` : ''}
              ${extraHtml}
            </div>
          </div>`
      })
    })
    const doneClass = phaseDone === phaseTotal ? 'done' : ''
    html += `
      <div class="phase" id="phase_${phase.id}">
        <div class="phase-header" onclick="togglePhase('${phase.id}')">
          <span class="phase-icon">${phase.icon}</span>
          <span class="phase-title">${phase.title}</span>
          <span class="phase-count ${doneClass}">${phaseDone} / ${phaseTotal}</span>
          <span class="phase-toggle">▾</span>
        </div>
        <div class="phase-body">${sectionsHtml}</div>
      </div>`
  })
  area.innerHTML = html
}

window.togglePhase = function(id) {
  document.getElementById('phase_' + id).classList.toggle('collapsed')
}

window._toggleItem = async function(itemId) {
  if (!currentId) return
  const proj = projects[currentId]
  if (!proj.checks) proj.checks = {}
  const newVal = !proj.checks[itemId]
  proj.checks[itemId] = newVal
  renderChecklist()
  updateProgress()
  renderSidebar()
  await upsertCheck(currentId, itemId, newVal)
}

function syncSettings() {
  const proj = projects[currentId]
  if (!proj) return
  document.getElementById('sel_domain_type').value = proj.domain_type || ''
  document.getElementById('sel_server_type').value = proj.server_type || ''
  document.getElementById('sel_mail_type').value   = proj.mail_type   || ''
  const allSet = proj.domain_type && proj.server_type && proj.mail_type
  document.getElementById('settingsHint').textContent = allSet
    ? '絞り込み中 ▸'
    : '選択するとチェックリストが絞り込まれます ▸'
}

window.toggleSettings = function() {
  const body = document.getElementById('settingsBody')
  const hint = document.getElementById('settingsHint')
  const open = body.style.display !== 'none'
  body.style.display = open ? 'none' : ''
  hint.textContent = hint.textContent.replace(/[▸▾]/, open ? '▸' : '▾')
}

window.onSettingsChange = function() {
  if (!currentId) return
  const proj = projects[currentId]
  proj.domain_type = document.getElementById('sel_domain_type').value || null
  proj.server_type = document.getElementById('sel_server_type').value || null
  proj.mail_type   = document.getElementById('sel_mail_type').value   || null
  const allSet = proj.domain_type && proj.server_type && proj.mail_type
  document.getElementById('settingsHint').textContent = allSet ? '絞り込み中 ▸' : '選択するとチェックリストが絞り込まれます ▸'
  renderChecklist()
  updateProgress()
  clearTimeout(metaSaveTimer)
  metaSaveTimer = setTimeout(() => saveProjectMeta(currentId), 600)
}

window.startDnsMonitoring = async function() {
  if (!currentId) return
  await supabase.from('projects').update({ dns_monitoring: true }).eq('id', currentId)
  projects[currentId].dns_monitoring = true
  renderChecklist()
  showToast('DNS監視を開始しました。伝播を確認したらSlackに通知します')
}

window.checkDnsNow = async function() {
  const btn = document.getElementById('dnsNowBtn')
  if (btn) { btn.disabled = true; btn.textContent = '確認中...' }
  try {
    const res = await fetch(`/api/dns-check?project_id=${currentId}`)
    const data = await res.json()
    const result = data.results?.[0]
    if (result?.status === 'confirmed') {
      projects[currentId].dns_monitoring = false
      projects[currentId].dns_confirmed_at = new Date().toISOString()
      renderChecklist()
      showToast('DNS伝播を確認しました！')
    } else {
      showToast('まだ伝播していません。しばらく待って再確認してください')
      if (btn) { btn.disabled = false; btn.textContent = '今すぐ確認' }
    }
  } catch(e) {
    showToast('確認に失敗しました')
    if (btn) { btn.disabled = false; btn.textContent = '今すぐ確認' }
  }
}

function updateProgress() {
  if (!currentId) return
  const { done, total, pct } = calcProgress(projects[currentId])
  document.getElementById('progressFill').style.width = pct + '%'
  document.getElementById('progressText').textContent = `${done} / ${total} 完了`
}

// ===== META INPUT =====
let metaSaveTimer = null
window.onNameInput = function() {
  if (!currentId) return
  projects[currentId].name = document.getElementById('editName').value
  clearTimeout(metaSaveTimer)
  metaSaveTimer = setTimeout(() => { saveProjectMeta(currentId); renderSidebar() }, 600)
}
window.onMetaInput = function() {
  if (!currentId) return
  projects[currentId].url = document.getElementById('editUrl').value
  projects[currentId].date = document.getElementById('editDate').value
  projects[currentId].owner = document.getElementById('editOwner').value
  syncCheckButton()
  clearTimeout(metaSaveTimer)
  metaSaveTimer = setTimeout(() => saveProjectMeta(currentId), 600)
}
function syncCheckButton() {
  const url = projects[currentId]?.url || ''
  const btn = document.getElementById('runCheckBtn')
  const hint = document.getElementById('checkHint')
  if (!btn) return
  btn.disabled = !url.trim()
  if (hint) hint.textContent = url.trim() ? '' : '本番URLを入力すると実行できます'
}

const CHECK_LABELS = {
  ssl:            'SSL証明書',
  https_redirect: 'HTTPSリダイレクト',
  noindex:        'noindex 未設定確認',
  title:          'title タグ',
  description:    'meta description',
  ogp:            'OGP 設定',
  analytics:      'GA / GTM タグ',
  forms:          'フォーム検出・構造',
  form_behavior:  'フォーム動作テスト',
  links:          'リンク切れ（内部）',
}

window.runAutoCheck = async function() {
  const url = projects[currentId]?.url
  if (!url) return
  const btn  = document.getElementById('runCheckBtn')
  const grid = document.getElementById('checkResultsGrid')
  btn.disabled = true
  btn.textContent = '確認中...'
  grid.style.display = 'grid'
  grid.innerHTML = '<div style="color:#888;font-size:13px;grid-column:1/-1;padding:4px 0">サイトにアクセスしてチェック中です（10〜20秒ほどかかります）...</div>'
  try {
    const res  = await fetch(`/api/check?url=${encodeURIComponent(url)}`)
    const data = await res.json()
    if (data.error && !data.results) {
      grid.innerHTML = `<div style="color:#c00;font-size:13px;grid-column:1/-1">${esc(data.error)}</div>`
      return
    }
    let html = `<div style="font-size:11px;color:#aaa;grid-column:1/-1;margin-bottom:2px">チェック日時: ${new Date().toLocaleString('ja-JP')} ／ ${esc(url)}</div>`
    for (const [key, r] of Object.entries(data.results || {})) {
      const cls  = r.ok === true ? 'pass' : r.ok === false ? 'fail' : key === 'forms' ? 'info' : 'warn'
      const icon = r.ok === true ? '✅' : r.ok === false ? '❌' : key === 'forms' ? 'ℹ️' : '⚠️'
      html += `<div class="cri ${cls}">
        <span class="cri-icon">${icon}</span>
        <div><div class="cri-label">${CHECK_LABELS[key] || key}</div><div class="cri-detail">${esc(r.detail || '')}</div></div>
      </div>`
    }
    grid.innerHTML = html
  } catch (e) {
    grid.innerHTML = `<div style="color:#c00;font-size:13px;grid-column:1/-1">通信エラー: ${esc(e.message)}</div>`
  } finally {
    btn.disabled = false
    btn.textContent = '再チェック'
  }
}

window.onMemoInput = function() {
  if (!currentId) return
  projects[currentId].memo = document.getElementById('editMemo').value
  clearTimeout(metaSaveTimer)
  metaSaveTimer = setTimeout(() => saveProjectMeta(currentId), 800)
}

// ===== MODAL =====
window.openNewModal = function() {
  ['newName','newUrl','newDate','newOwner'].forEach(id => document.getElementById(id).value = '')
  document.getElementById('newModal').classList.remove('hidden')
  setTimeout(() => document.getElementById('newName').focus(), 50)
}
window.closeNewModal = function() {
  document.getElementById('newModal').classList.add('hidden')
}
document.getElementById('newModal').addEventListener('click', e => {
  if (e.target === document.getElementById('newModal')) window.closeNewModal()
})
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') window.closeNewModal()
  if (e.key === 'Enter' && !document.getElementById('newModal').classList.contains('hidden')) window.createProject()
})

window.createProject = async function() {
  const name = document.getElementById('newName').value.trim()
  if (!name) { document.getElementById('newName').focus(); return }
  showLoading(true)
  window.closeNewModal()
  try {
    const id = await insertProject(
      name,
      document.getElementById('newUrl').value.trim(),
      document.getElementById('newDate').value,
      document.getElementById('newOwner').value.trim()
    )
    renderSidebar()
    await window._selectProject(id)
    showToast(`「${name}」を作成しました`)
  } catch(e) {
    showToast('作成に失敗しました')
  } finally {
    showLoading(false)
  }
}

window.deleteProject = async function() {
  const name = projects[currentId]?.name || 'この案件'
  if (!confirm(`「${name}」を削除しますか？\nチェックデータも全て削除されます。`)) return
  showLoading(true)
  await removeProject(currentId)
  delete projects[currentId]
  currentId = null
  localStorage.removeItem('cl_current')
  document.getElementById('projectView').style.display = 'none'
  document.getElementById('emptyState').style.display = 'flex'
  renderSidebar()
  showLoading(false)
  showToast('削除しました')
}

window.uncheckAll = async function() {
  if (!currentId) return
  if (!confirm('全てのチェックをリセットしますか？')) return
  showLoading(true)
  await supabase.from('checks').delete().eq('project_id', currentId)
  projects[currentId].checks = {}
  renderChecklist()
  updateProgress()
  renderSidebar()
  showLoading(false)
  showToast('リセットしました')
}

// ===== EXPORT =====
window.exportTxt = function() {
  if (!currentId) return
  const p = projects[currentId]
  const { done, total, pct } = calcProgress(p)
  const lines = [
    'サイト公開チェックリスト',
    `出力日時：${new Date().toLocaleString('ja-JP')}`,
    '',
    `案件名　　：${p.name || '未設定'}`,
    `本番URL　：${p.url || '未設定'}`,
    `公開予定日：${p.date || '未設定'}`,
    `担当者　　：${p.owner || '未設定'}`,
    `進捗　　　：${done} / ${total} 完了（${pct}%）`,
    ...(p.memo ? [``, `【備考】`, p.memo] : []),
    '',
  ]
  PHASES.forEach(phase => {
    lines.push('\n' + '='.repeat(44))
    lines.push(`${phase.icon} ${phase.title}`)
    lines.push('='.repeat(44))
    phase.sections.forEach(s => {
      lines.push(`\n【${s.label}】`)
      s.items.forEach(i => {
        const mark = p.checks && p.checks[i.id] ? '☑' : '☐'
        lines.push(`  ${mark} ${i.label}${i.critical ? ' ★重要' : ''}`)
      })
    })
  })
  const blob = new Blob([lines.join('\n')], { type: 'text/plain;charset=utf-8' })
  const a = document.createElement('a')
  a.href = URL.createObjectURL(blob)
  a.download = `公開チェックリスト_${p.name || '案件'}_${p.date || '日付未設定'}.txt`
  a.click()
  showToast('テキストファイルを書き出しました')
}

// ===== UTIL =====
function esc(s) {
  return (s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')
}
function showLoading(v) {
  document.getElementById('loadingOverlay').classList.toggle('hidden', !v)
}
function showToast(msg) {
  const t = document.getElementById('toast')
  t.textContent = msg
  t.classList.add('show')
  setTimeout(() => t.classList.remove('show'), 2500)
}

// ===== INIT =====
showLoading(true)
await loadAllProjects()
subscribeRealtime()
renderSidebar()
const lastId = localStorage.getItem('cl_current')
if (lastId && projects[lastId]) {
  await window._selectProject(lastId)
} else {
  document.getElementById('emptyState').style.display = 'flex'
  showLoading(false)
}
</script>
